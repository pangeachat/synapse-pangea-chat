name: Linting
on:
  push:
    branches: ["main"]
  pull_request:

# Integration tests require a local PostgreSQL + Synapse instance
# (via testing.postgresql + BaseSynapseE2ETest). Run them locally
# before merging — see testing.instructions.md.

permissions:
  contents: read

jobs:
  check-code-style:
    name: Check code style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.x"
      - run: python -m pip install tox
      - run: tox -e check_codestyle

  check-types:
    name: Check types with Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.x"
      - run: python -m pip install tox
      - run: tox -e check_types
