name: Add "needs testing" on issue close

on:
  issues:
    types: [closed]

jobs:
  add-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add "needs testing" label (unless opted out)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          BODY=$(gh issue view "$NUMBER" --json body -q .body)
          if echo "$BODY" | grep -qi "no client testing needed"; then
            echo "Issue opts out of client testing — skipping label."
            exit 0
          fi
          gh issue edit "$NUMBER" --add-label "needs testing"
