# Minimum Synapse version required by this commit of synapse-pangea-chat.
# This file is read by the ansible deploy.sh script to prevent deploying
# module code to a Synapse homeserver that is too old.
#
# If this file is absent in a given commit, any Synapse version is assumed compatible.
# Do not lower min_synapse_version without auditing all sub-module imports first.

min_synapse_version: "1.124.0"
reason: "delete_user, export_user_data, and delayed_push were audited against Synapse 1.124.0; delayed_push also enforces an exact runtime version guard before monkey-patching HttpPusher internals"
